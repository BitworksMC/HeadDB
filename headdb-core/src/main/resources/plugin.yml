name: HeadDB
description: ${project.description}
author: TheSilentPro (Silent)

main: com.bitworksmc.headdb.core.HeadDB
version: ${project.version}
softdepend: [
  #"PlaceholderAPI",
  "Vault"
]
api-version: 1.21
folia-supported: true
libraries:
  - "org.xerial:sqlite-jdbc:3.47.0.0"

spigot-id: 84967

commands:
  headdb:
    usage: /headdb help
    description: Open the database
    aliases: ["hdb", "headdatabase", "headmenu"]

permissions:
  headdb.admin:
    default: op
    children:
      headdb.command.open: true
      headdb.command.search: true
      headdb.command.give: true
      headdb.category.*: true
      headdb.category.favorites: true
      headdb.favorites: true
      headdb.category.local: true
      headdb.category.custom: true
  headdb.command.open:
    default: op
  headdb.command.search:
    default: op
  headdb.command.give:
    default: op
  headdb.favorites:
    default: op
    children:
      headdb.category.favorites: true
  headdb.category:
    default: op
    children:
      headdb.category.*: true
  headdb.category.*:
    default: op
    children:
      headdb.category.local: true
      headdb.category.custom: true
      headdb.category.favorites: true
  headdb.category.local:
    default: op
  headdb.category.custom:
    default: op
  headdb.category.favorites:
    default: op
